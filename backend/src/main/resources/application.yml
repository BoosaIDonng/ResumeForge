server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ai_resume?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  data:
    redis:
      host: localhost
      port: 6379

ai:
  openai-compatible:
    base-url: ${AI_BASE_URL:http://localhost:11434/v1}
    api-key: ${AI_API_KEY:local-dev-key}
    model: ${AI_MODEL:deepseek-chat}
