<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>简历</title>
    <style>
        @page { size: A4; margin: 12mm 15mm; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'SimHei', sans-serif; font-size: 9pt; line-height: 1.4; color: #1a1a1a; }
        .header { margin-bottom: 8pt; padding-bottom: 6pt; border-bottom: 1px solid #ccc; }
        .header h1 { font-size: 16pt; font-weight: 700; display: inline; }
        .header .contact { float: right; font-size: 8pt; color: #666; margin-top: 4pt; }
        .header .contact span { margin-left: 10pt; }
        h2 { font-size: 10pt; font-weight: 700; color: #333; margin: 8pt 0 4pt 0; padding-bottom: 2pt; border-bottom: 1px solid #ddd; text-transform: uppercase; letter-spacing: 0.5pt; }
        h3 { font-size: 9pt; font-weight: 600; color: #222; margin-bottom: 1pt; }
        .summary { margin-bottom: 6pt; font-size: 8.5pt; color: #444; }
        .section { margin-bottom: 6pt; }
        .item { margin-bottom: 5pt; }
        .item-header { display: block; }
        .item-date { float: right; font-size: 8pt; color: #999; }
        .item-subtitle { color: #555; font-size: 8pt; }
        .item-desc { font-size: 8.5pt; color: #333; margin-top: 1pt; }
        .skills-inline { font-size: 8.5pt; color: #333; }
        .clear { clear: both; }
    </style>
</head>
<body>
    <div class="header">
        <h1 th:if="${resume['basics'] != null}" th:text="${resume['basics']['name']}"></h1>
        <div class="contact" th:if="${resume['basics'] != null}">
            <span th:if="${resume['basics']['email'] != null and !resume['basics']['email'].isEmpty()}" th:text="${resume['basics']['email']}"></span>
            <span th:if="${resume['basics']['phone'] != null and !resume['basics']['phone'].isEmpty()}" th:text="${resume['basics']['phone']}"></span>
            <span th:if="${resume['basics']['location'] != null and !resume['basics']['location'].isEmpty()}" th:text="${resume['basics']['location']}"></span>
        </div>
        <div class="clear"></div>
    </div>

    <div class="summary" th:if="${resume['summary'] != null and resume['summary']['content'] != null and !resume['summary']['content'].isEmpty()}">
        <p th:text="${resume['summary']['content']}"></p>
    </div>

    <div class="section" th:if="${resume['sections'] != null and resume['sections']['experience'] != null and resume['sections']['experience']['items'] != null}">
        <h2 th:text="${resume['sections']['experience']['name'] != null} ? ${resume['sections']['experience']['name']} : '工作经历'">工作经历</h2>
        <div class="item" th:each="item : ${resume['sections']['experience']['items']}">
            <div class="item-header">
                <span class="item-date" th:if="${item['startDate'] != null}" th:text="${item['startDate'] + (item['endDate'] != null and !item['endDate'].isEmpty() ? ' - ' + item['endDate'] : ' - 至今')}"></span>
                <h3 th:text="${item['position'] != null ? item['position'] : ''}"></h3>
            </div>
            <div class="item-subtitle" th:text="${item['company'] != null ? item['company'] : ''}"></div>
            <div class="clear"></div>
            <div class="item-desc" th:if="${item['summary'] != null and !item['summary'].isEmpty()}" th:text="${item['summary']}"></div>
        </div>
    </div>

    <div class="section" th:if="${resume['sections'] != null and resume['sections']['projects'] != null and resume['sections']['projects']['items'] != null}">
        <h2 th:text="${resume['sections']['projects']['name'] != null} ? ${resume['sections']['projects']['name']} : '项目经历'">项目经历</h2>
        <div class="item" th:each="item : ${resume['sections']['projects']['items']}">
            <div class="item-header">
                <span class="item-date" th:if="${item['startDate'] != null}" th:text="${item['startDate'] + (item['endDate'] != null and !item['endDate'].isEmpty() ? ' - ' + item['endDate'] : '')}"></span>
                <h3 th:text="${item['name'] != null ? item['name'] : ''}"></h3>
            </div>
            <div class="clear"></div>
            <div class="item-desc" th:if="${item['description'] != null and !item['description'].isEmpty()}" th:text="${item['description']}"></div>
        </div>
    </div>

    <div class="section" th:if="${resume['sections'] != null and resume['sections']['education'] != null and resume['sections']['education']['items'] != null}">
        <h2 th:text="${resume['sections']['education']['name'] != null} ? ${resume['sections']['education']['name']} : '教育经历'">教育经历</h2>
        <div class="item" th:each="item : ${resume['sections']['education']['items']}">
            <div class="item-header">
                <span class="item-date" th:if="${item['startDate'] != null}" th:text="${item['startDate'] + (item['endDate'] != null and !item['endDate'].isEmpty() ? ' - ' + item['endDate'] : '')}"></span>
                <h3 th:text="${item['institution'] != null ? item['institution'] : ''}"></h3>
            </div>
            <div class="item-subtitle" th:text="${(item['studyType'] != null ? item['studyType'] : '') + (item['area'] != null ? ' · ' + item['area'] : '')}"></div>
            <div class="clear"></div>
        </div>
    </div>

    <div class="section skills-inline" th:if="${resume['sections'] != null and resume['sections']['skills'] != null and resume['sections']['skills']['items'] != null}">
        <h2 th:text="${resume['sections']['skills']['name'] != null} ? ${resume['sections']['skills']['name']} : '技能'">技能</h2>
        <span th:each="item, iter : ${resume['sections']['skills']['items']}">
            <span th:text="${(item['name'] != null ? item['name'] + '：' : '') + (item['keywords'] != null ? #strings.listJoin(item['keywords'], ', ') : '')}"></span>
            <span th:if="${!iter.last}"> | </span>
        </span>
    </div>
</body>
</html>
