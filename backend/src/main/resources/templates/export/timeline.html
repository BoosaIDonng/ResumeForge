<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>简历</title>
    <style>
        @page { size: A4; margin: 18mm 20mm; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'SimHei', sans-serif; font-size: 10pt; line-height: 1.5; color: #333; }
        .header { text-align: center; margin-bottom: 14pt; padding-bottom: 10pt; border-bottom: 3px double #333; }
        .header h1 { font-size: 22pt; font-weight: 700; }
        .header .headline { font-size: 11pt; color: #666; margin-top: 4pt; }
        .header .contact { font-size: 9pt; color: #888; margin-top: 6pt; }
        .header .contact span { margin: 0 8pt; }
        h2 { font-size: 12pt; font-weight: 700; color: #2c3e50; margin: 14pt 0 8pt 0; }
        .summary { margin-bottom: 10pt; font-size: 9.5pt; color: #555; }
        .timeline { position: relative; padding-left: 20pt; }
        .timeline::before { content: ''; position: absolute; left: 6pt; top: 0; bottom: 0; width: 2px; background-color: #3498db; }
        .timeline-item { position: relative; margin-bottom: 10pt; }
        .timeline-item::before { content: ''; position: absolute; left: -17pt; top: 4pt; width: 8pt; height: 8pt; background-color: #3498db; border-radius: 50%; }
        .timeline-item h3 { font-size: 10.5pt; font-weight: 600; color: #2c3e50; margin-bottom: 1pt; }
        .timeline-meta { font-size: 9pt; color: #888; margin-bottom: 2pt; }
        .timeline-desc { font-size: 9.5pt; color: #444; margin-top: 2pt; }
        .section { margin-bottom: 12pt; }
        .skills-list { font-size: 9.5pt; }
        .skill-group { margin-bottom: 4pt; }
        .skill-name { font-weight: 600; color: #2c3e50; }
    </style>
</head>
<body>
    <div class="header">
        <h1 th:if="${resume['basics'] != null}" th:text="${resume['basics']['name']}"></h1>
        <div class="headline" th:if="${resume['basics'] != null and resume['basics']['headline'] != null}" th:text="${resume['basics']['headline']}"></div>
        <div class="contact" th:if="${resume['basics'] != null}">
            <span th:if="${resume['basics']['email'] != null and !resume['basics']['email'].isEmpty()}" th:text="${resume['basics']['email']}"></span>
            <span th:if="${resume['basics']['phone'] != null and !resume['basics']['phone'].isEmpty()}" th:text="${resume['basics']['phone']}"></span>
            <span th:if="${resume['basics']['location'] != null and !resume['basics']['location'].isEmpty()}" th:text="${resume['basics']['location']}"></span>
        </div>
    </div>

    <div class="summary" th:if="${resume['summary'] != null and resume['summary']['content'] != null and !resume['summary']['content'].isEmpty()}">
        <p th:text="${resume['summary']['content']}"></p>
    </div>

    <div class="section" th:if="${resume['sections'] != null and resume['sections']['experience'] != null and resume['sections']['experience']['items'] != null}">
        <h2 th:text="${resume['sections']['experience']['name'] != null} ? ${resume['sections']['experience']['name']} : '工作经历'">工作经历</h2>
        <div class="timeline">
            <div class="timeline-item" th:each="item : ${resume['sections']['experience']['items']}">
                <div class="timeline-meta" th:if="${item['startDate'] != null}" th:text="${item['startDate'] + (item['endDate'] != null and !item['endDate'].isEmpty() ? ' - ' + item['endDate'] : ' - 至今')}"></div>
                <h3 th:text="${item['position'] != null ? item['position'] : ''}"></h3>
                <div class="timeline-meta" th:text="${item['company'] != null ? item['company'] : ''}"></div>
                <div class="timeline-desc" th:if="${item['summary'] != null and !item['summary'].isEmpty()}" th:text="${item['summary']}"></div>
            </div>
        </div>
    </div>

    <div class="section" th:if="${resume['sections'] != null and resume['sections']['projects'] != null and resume['sections']['projects']['items'] != null}">
        <h2 th:text="${resume['sections']['projects']['name'] != null} ? ${resume['sections']['projects']['name']} : '项目经历'">项目经历</h2>
        <div class="timeline">
            <div class="timeline-item" th:each="item : ${resume['sections']['projects']['items']}">
                <div class="timeline-meta" th:if="${item['startDate'] != null}" th:text="${item['startDate'] + (item['endDate'] != null and !item['endDate'].isEmpty() ? ' - ' + item['endDate'] : '')}"></div>
                <h3 th:text="${item['name'] != null ? item['name'] : ''}"></h3>
                <div class="timeline-desc" th:if="${item['description'] != null and !item['description'].isEmpty()}" th:text="${item['description']}"></div>
            </div>
        </div>
    </div>

    <div class="section" th:if="${resume['sections'] != null and resume['sections']['education'] != null and resume['sections']['education']['items'] != null}">
        <h2 th:text="${resume['sections']['education']['name'] != null} ? ${resume['sections']['education']['name']} : '教育经历'">教育经历</h2>
        <div class="timeline">
            <div class="timeline-item" th:each="item : ${resume['sections']['education']['items']}">
                <div class="timeline-meta" th:if="${item['startDate'] != null}" th:text="${item['startDate'] + (item['endDate'] != null and !item['endDate'].isEmpty() ? ' - ' + item['endDate'] : '')}"></div>
                <h3 th:text="${item['institution'] != null ? item['institution'] : ''}"></h3>
                <div class="timeline-meta" th:text="${(item['studyType'] != null ? item['studyType'] : '') + (item['area'] != null ? ' · ' + item['area'] : '')}"></div>
            </div>
        </div>
    </div>

    <div class="section skills-list" th:if="${resume['sections'] != null and resume['sections']['skills'] != null and resume['sections']['skills']['items'] != null}">
        <h2 th:text="${resume['sections']['skills']['name'] != null} ? ${resume['sections']['skills']['name']} : '技能'">技能</h2>
        <div class="skill-group" th:each="item : ${resume['sections']['skills']['items']}">
            <span class="skill-name" th:text="${item['name'] != null ? item['name'] + '：' : ''}"></span>
            <span th:if="${item['keywords'] != null}" th:text="${#strings.listJoin(item['keywords'], ', ')}"></span>
        </div>
    </div>
</body>
</html>
