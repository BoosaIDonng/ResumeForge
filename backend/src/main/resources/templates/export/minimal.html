<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>简历</title>
    <style>
        @page { size: A4; margin: 25mm 25mm; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'SimHei', sans-serif; font-size: 10pt; line-height: 1.7; color: #333; }
        h1 { font-size: 18pt; font-weight: 400; letter-spacing: 2pt; margin-bottom: 4pt; }
        h2 { font-size: 10pt; font-weight: 400; text-transform: uppercase; letter-spacing: 1.5pt; color: #999; margin: 16pt 0 8pt 0; }
        h3 { font-size: 10pt; font-weight: 600; }
        .header { margin-bottom: 16pt; }
        .contact { font-size: 9pt; color: #666; margin-top: 4pt; }
        .contact span { margin-right: 10pt; }
        .divider { border: none; border-top: 1px solid #ddd; margin: 8pt 0; }
        .section { margin-bottom: 12pt; }
        .item { margin-bottom: 10pt; }
        .item-meta { font-size: 9pt; color: #888; }
        .item-desc { font-size: 9.5pt; color: #444; margin-top: 3pt; }
        .skills { font-size: 9.5pt; color: #444; }
    </style>
</head>
<body>
    <div class="header">
        <h1 th:if="${resume['basics'] != null}" th:text="${resume['basics']['name']}"></h1>
        <div class="contact" th:if="${resume['basics'] != null}">
            <span th:if="${resume['basics']['email'] != null and !resume['basics']['email'].isEmpty()}" th:text="${resume['basics']['email']}"></span>
            <span th:if="${resume['basics']['phone'] != null and !resume['basics']['phone'].isEmpty()}" th:text="${resume['basics']['phone']}"></span>
            <span th:if="${resume['basics']['location'] != null and !resume['basics']['location'].isEmpty()}" th:text="${resume['basics']['location']}"></span>
        </div>
    </div>

    <hr class="divider" />

    <div class="section" th:if="${resume['summary'] != null and resume['summary']['content'] != null and !resume['summary']['content'].isEmpty()}">
        <p style="font-size: 9.5pt; color: #555;" th:text="${resume['summary']['content']}"></p>
    </div>

    <div class="section" th:if="${resume['sections'] != null and resume['sections']['experience'] != null and resume['sections']['experience']['items'] != null}">
        <h2>经历</h2>
        <div class="item" th:each="item : ${resume['sections']['experience']['items']}">
            <h3 th:text="${item['position'] != null ? item['position'] : ''}"></h3>
            <div class="item-meta" th:text="${(item['company'] != null ? item['company'] : '') + (item['startDate'] != null ? ' · ' + item['startDate'] + (item['endDate'] != null and !item['endDate'].isEmpty() ? ' - ' + item['endDate'] : ' - 至今') : '')}"></div>
            <div class="item-desc" th:if="${item['summary'] != null and !item['summary'].isEmpty()}" th:text="${item['summary']}"></div>
        </div>
    </div>

    <div class="section" th:if="${resume['sections'] != null and resume['sections']['projects'] != null and resume['sections']['projects']['items'] != null}">
        <h2>项目</h2>
        <div class="item" th:each="item : ${resume['sections']['projects']['items']}">
            <h3 th:text="${item['name'] != null ? item['name'] : ''}"></h3>
            <div class="item-desc" th:if="${item['description'] != null and !item['description'].isEmpty()}" th:text="${item['description']}"></div>
        </div>
    </div>

    <div class="section" th:if="${resume['sections'] != null and resume['sections']['education'] != null and resume['sections']['education']['items'] != null}">
        <h2>教育</h2>
        <div class="item" th:each="item : ${resume['sections']['education']['items']}">
            <h3 th:text="${item['institution'] != null ? item['institution'] : ''}"></h3>
            <div class="item-meta" th:text="${(item['studyType'] != null ? item['studyType'] + ' ' : '') + (item['area'] != null ? item['area'] : '')}"></div>
        </div>
    </div>

    <div class="section skills" th:if="${resume['sections'] != null and resume['sections']['skills'] != null and resume['sections']['skills']['items'] != null}">
        <h2>技能</h2>
        <div th:each="item : ${resume['sections']['skills']['items']}">
            <span th:text="${(item['name'] != null ? item['name'] + '：' : '') + (item['keywords'] != null ? #strings.listJoin(item['keywords'], ' / ') : '')}"></span>
        </div>
    </div>
</body>
</html>
