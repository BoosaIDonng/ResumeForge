<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>简历</title>
    <style>
        @page { size: A4; margin: 15mm 20mm; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'SimHei', sans-serif; font-size: 10pt; line-height: 1.6; color: #2d2d2d; }
        .header { background-color: #2c3e50; color: #fff; padding: 20pt; margin: -15mm -20mm 12pt -20mm; }
        .header h1 { font-size: 22pt; font-weight: 700; }
        .header .headline { font-size: 11pt; color: #bdc3c7; margin-top: 4pt; }
        .header .contact { font-size: 9pt; color: #ecf0f1; margin-top: 8pt; }
        .header .contact span { margin-right: 12pt; }
        h2 { font-size: 12pt; font-weight: 700; color: #2c3e50; margin: 12pt 0 6pt 0; padding-bottom: 3pt; border-bottom: 2px solid #3498db; }
        h3 { font-size: 10.5pt; font-weight: 600; color: #2c3e50; }
        .summary { margin-bottom: 8pt; font-size: 9.5pt; color: #444; padding: 6pt; background-color: #f8f9fa; }
        .section { margin-bottom: 10pt; }
        .item { margin-bottom: 8pt; padding-left: 8pt; border-left: 2px solid #3498db; }
        .item-meta { font-size: 9pt; color: #7f8c8d; margin-bottom: 2pt; }
        .item-desc { font-size: 9.5pt; color: #333; margin-top: 2pt; }
        .skills-list { font-size: 9.5pt; }
        .skill-group { display: inline-block; margin: 2pt 4pt 2pt 0; padding: 2pt 6pt; background-color: #ecf0f1; font-size: 9pt; }
    </style>
</head>
<body>
    <div class="header">
        <h1 th:if="${resume['basics'] != null}" th:text="${resume['basics']['name']}"></h1>
        <div class="headline" th:if="${resume['basics'] != null and resume['basics']['headline'] != null}" th:text="${resume['basics']['headline']}"></div>
        <div class="contact" th:if="${resume['basics'] != null}">
            <span th:if="${resume['basics']['email'] != null and !resume['basics']['email'].isEmpty()}" th:text="${resume['basics']['email']}"></span>
            <span th:if="${resume['basics']['phone'] != null and !resume['basics']['phone'].isEmpty()}" th:text="${resume['basics']['phone']}"></span>
            <span th:if="${resume['basics']['location'] != null and !resume['basics']['location'].isEmpty()}" th:text="${resume['basics']['location']}"></span>
        </div>
    </div>

    <div class="summary" th:if="${resume['summary'] != null and resume['summary']['content'] != null and !resume['summary']['content'].isEmpty()}">
        <p th:text="${resume['summary']['content']}"></p>
    </div>

    <div class="section" th:if="${resume['sections'] != null and resume['sections']['experience'] != null and resume['sections']['experience']['items'] != null}">
        <h2 th:text="${resume['sections']['experience']['name'] != null} ? ${resume['sections']['experience']['name']} : '工作经历'">工作经历</h2>
        <div class="item" th:each="item : ${resume['sections']['experience']['items']}">
            <h3 th:text="${(item['position'] != null ? item['position'] : '') + (item['company'] != null ? ' @ ' + item['company'] : '')}"></h3>
            <div class="item-meta" th:text="${(item['startDate'] != null ? item['startDate'] : '') + (item['endDate'] != null and !item['endDate'].isEmpty() ? ' - ' + item['endDate'] : ' - 至今')}"></div>
            <div class="item-desc" th:if="${item['summary'] != null and !item['summary'].isEmpty()}" th:text="${item['summary']}"></div>
        </div>
    </div>

    <div class="section" th:if="${resume['sections'] != null and resume['sections']['projects'] != null and resume['sections']['projects']['items'] != null}">
        <h2 th:text="${resume['sections']['projects']['name'] != null} ? ${resume['sections']['projects']['name']} : '项目经历'">项目经历</h2>
        <div class="item" th:each="item : ${resume['sections']['projects']['items']}">
            <h3 th:text="${item['name'] != null ? item['name'] : ''}"></h3>
            <div class="item-meta" th:if="${item['startDate'] != null}" th:text="${item['startDate'] + (item['endDate'] != null and !item['endDate'].isEmpty() ? ' - ' + item['endDate'] : '')}"></div>
            <div class="item-desc" th:if="${item['description'] != null and !item['description'].isEmpty()}" th:text="${item['description']}"></div>
        </div>
    </div>

    <div class="section" th:if="${resume['sections'] != null and resume['sections']['education'] != null and resume['sections']['education']['items'] != null}">
        <h2 th:text="${resume['sections']['education']['name'] != null} ? ${resume['sections']['education']['name']} : '教育经历'">教育经历</h2>
        <div class="item" th:each="item : ${resume['sections']['education']['items']}">
            <h3 th:text="${item['institution'] != null ? item['institution'] : ''}"></h3>
            <div class="item-meta" th:text="${(item['studyType'] != null ? item['studyType'] : '') + (item['area'] != null ? ' · ' + item['area'] : '') + (item['startDate'] != null ? ' | ' + item['startDate'] + (item['endDate'] != null ? ' - ' + item['endDate'] : '') : '')}"></div>
        </div>
    </div>

    <div class="section skills-list" th:if="${resume['sections'] != null and resume['sections']['skills'] != null and resume['sections']['skills']['items'] != null}">
        <h2 th:text="${resume['sections']['skills']['name'] != null} ? ${resume['sections']['skills']['name']} : '技能'">技能</h2>
        <div th:each="item : ${resume['sections']['skills']['items']}">
            <strong th:text="${item['name'] != null ? item['name'] + '：' : ''}"></strong>
            <span class="skill-group" th:each="kw : ${item['keywords']}" th:text="${kw}"></span>
        </div>
    </div>
</body>
</html>
